<!DOCTYPE html>
<html>
<head>
    <title>Select Plan</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f3f4f6;
            padding: 40px;
        }

        .plans {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 200px;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Select Plan</h1>

<div class="plans">

    <div class="card">
        <h3>Free</h3>
        <p>₹0</p>
        <a href="/select_plan/free"><button>Select</button></a>
    </div>

    <div class="card">
        <h3>Monthly</h3>
        <p>₹100</p>
        <a href="/select_plan/monthly"><button>Select</button></a>
    </div>

    <div class="card">
        <h3>Yearly</h3>
        <p>₹1000</p>
        <a href="/select_plan/yearly"><button>Select</button></a>
    </div>

</div>

</body>
</html>
